services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
    volumes:
      - quantstock_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${WS_URL:-ws://localhost:8000/ws/alerts}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  quantstock_data:
