version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
    volumes:
      - ./backend/quantstock.db:/app/quantstock.db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/alerts
    depends_on:
      - backend
